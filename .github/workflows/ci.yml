name: Java CI with Maven

# 1. Триггеры: когда запускать пайплайн
on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

# 2. Описание шагов сборки
jobs:
  build:
    # Запускаем на чистой Ubuntu
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Скачиваем исходный код репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Настраиваем Java окружение и кэширование Maven
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # Хороший дистрибутив по умолчанию (Eclipse Temurin)
          cache: 'maven'          # Кэширует зависимости, чтобы сборка шла быстрее

      # Шаг 3: Сборка проекта и запуск юнит/интеграционных тестов
      - name: Build and Test with Maven
        run: mvn clean test

      # Шаг 4: (Опционально) Сохраняем отчеты о тестах, если они упали
      - name: Upload test results
        if: failure() # Сработает только если предыдущий шаг (тесты) завершился ошибкой
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/'