version: '3.8'

services:
  lms-db:
    image: postgres:17-alpine
    container_name: lms-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=lms_main
    volumes:
      - lms_db_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - lms-network

volumes:
  lms_db_data:

networks:
  lms-network:
    driver: bridge